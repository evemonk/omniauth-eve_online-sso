AllCops:
  TargetRubyVersion: 3.2
  DisplayStyleGuide: true
  NewCops: enable

Style/StringLiterals:
  Enabled: false

Style/Documentation:
  Enabled: false

Bundler/OrderedGems:
  Enabled: false

Layout/LineLength:
  Enabled: false

Layout/ArgumentAlignment:
  Enabled: false

Layout/MultilineMethodCallIndentation:
  Enabled: false

Gemspec/OrderedDependencies:
  Enabled: false

Naming/FileName:
  Enabled: true
  Exclude:
    - "lib/omniauth-eve_online-sso.rb"

Metrics/BlockLength:
  Enabled: true
  Exclude:
    - "spec/omniauth/strategies/eve_online_sso_spec.rb"

Metrics/AbcSize:
  Enabled: true
  Exclude:
    - "lib/omniauth/strategies/eve_online_sso.rb"
